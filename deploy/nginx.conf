server {
    listen 80;
    server_name text2gene.org www.text2gene.org;

    # Redirect to HTTPS once cert is in place
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name text2gene.org www.text2gene.org;

    # Let's Encrypt (fill in after: certbot --nginx -d text2gene.org -d www.text2gene.org)
    ssl_certificate     /etc/letsencrypt/live/text2gene.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/text2gene.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/text2gene_access.log;
    error_log  /var/log/nginx/text2gene_error.log;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
